name: Build and Push Nix Docker Image to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: namespace-profile-arm64-tc-cache
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: namespacelabs/nscloud-checkout-action@v8
        with:
          path: .

      - name: Configure Nix cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: nix

      - name: Start Nix daemon
        run: |
          /nix/var/nix/profiles/default/bin/nix-daemon &
          sleep 2

      - name: Build Docker image with Nix
        run: nix run .#container.copyToDockerDaemon

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GitHub Container Registry
        env:
          SHA: ${{ github.sha }}
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}/pep-container
          docker tag $(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1) ${IMAGE_ID}:latest
          docker tag $(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1) ${IMAGE_ID}:sha-${SHA:0:7}
          docker push ${IMAGE_ID}:latest
          docker push ${IMAGE_ID}:sha-${SHA:0:7}
